<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Terminal Mk IV - Operation Vanguard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #020202;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'VT323', monospace;
            overflow: hidden;
            user-select: none;
        }

        #chassis {
            background-color: #1e201d;
            width: 96vw;
            height: 96vh;
            padding: 40px;
            border-radius: 20px;
            box-sizing: border-box;
            box-shadow: inset 0 0 20px #000, 0 0 50px rgba(0,0,0,1);
            border: 8px solid #0a0b0a;
            position: relative;
            display: flex;
            flex-direction: column;
            transition: transform 0.05s;
        }

        .rivet {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #111;
            border-radius: 50%;
            box-shadow: inset 2px 2px 4px #333, inset -2px -2px 4px #000;
        }
        .r-tl { top: 12px; left: 12px; }
        .r-tr { top: 12px; right: 12px; }
        .r-bl { bottom: 12px; left: 12px; }
        .r-br { bottom: 12px; right: 12px; }

        /* Muted P1 Phosphor Aesthetic */
        #screen {
            background: radial-gradient(circle at center, #051505 0%, #000000 90%);
            width: 100%;
            height: 100%;
            border-radius: 25px; 
            padding: 30px;
            box-sizing: border-box;
            box-shadow: inset 0 0 80px rgba(0,0,0,1), 0 0 10px rgba(107,194,107,0.05);
            border: 12px solid #050505;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: #6bc26b; /* Muted Green */
            text-shadow: 0 0 2px #6bc26b, 0 0 6px rgba(107,194,107,0.4); /* Reduced Bloom */
            font-size: 1.8rem;
            letter-spacing: 2px;
            animation: flicker 0.15s infinite;
            transition: background 0.5s, opacity 0.5s;
        }

        .power-loss {
            background: #000 !important;
            box-shadow: none !important;
            text-shadow: none !important;
        }
        .power-loss::after, .power-loss::before {
            display: none !important;
        }

        @keyframes flicker {
            0% { opacity: 0.98; }
            50% { opacity: 1; }
            100% { opacity: 0.99; }
        }

        #screen::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            z-index: 4;
            background-size: 100% 4px;
            pointer-events: none;
        }

        #screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: -10%; left: -10%; width: 120%; height: 120%;
            background: radial-gradient(ellipse at top left, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 50%);
            z-index: 5;
            pointer-events: none;
            border-radius: 50%;
        }

        #output {
            flex-grow: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            margin-bottom: 10px;
            padding-right: 15px;
            z-index: 3;
            line-height: 1.2;
            word-wrap: break-word;
        }

        #input-line {
            display: flex;
            align-items: center;
            font-weight: bold;
            z-index: 3;
            margin-bottom: 10px;
        }

        #prompt { margin-right: 15px; transition: color 0.3s; }
        .trace-warning { color: #d9534f; text-shadow: 0 0 4px #d9534f; } /* Muted Red */
        
        .cursor-blink {
            animation: blinker 1s linear infinite;
            color: #6bc26b;
        }
        @keyframes blinker {
            50% { opacity: 0; }
        }

        input[type="text"] {
            background: transparent;
            border: none;
            color: inherit;
            font-family: 'VT323', monospace;
            font-size: 1em;
            flex-grow: 1;
            outline: none;
            text-transform: uppercase;
            text-shadow: inherit;
            letter-spacing: 2px;
        }

        #command-bar {
            display: none; 
            border-top: 2px solid #2d5a2d;
            padding-top: 10px;
            margin-top: auto;
            font-size: 1.3rem;
            color: #4a8f4a;
            text-shadow: none;
            z-index: 3;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .cmd-block { 
            border-right: 2px solid #2d5a2d; 
            padding-right: 12px; 
            margin-right: 12px; 
            margin-bottom: 5px;
            position: relative;
            cursor: help;
            color: #5ebd5e;
        }
        
        .cmd-block:last-child { border-right: none; }

        .cmd-block:hover::after {
            content: attr(data-desc);
            position: absolute;
            bottom: 140%;
            left: 50%;
            transform: translateX(-50%);
            width: max-content;
            max-width: 300px;
            background: #020a02;
            border: 2px solid #6bc26b;
            padding: 10px;
            white-space: pre-wrap;
            color: #6bc26b;
            z-index: 20;
            box-shadow: 0 0 10px rgba(0,0,0,0.8);
            pointer-events: none;
            font-size: 1.2rem;
            text-align: center;
        }

        .cipher-hint {
            cursor: help;
            border-bottom: 2px dotted #6bc26b;
            position: relative;
            color: #e6e6b8; 
        }
        
        .cipher-hint:hover::after {
            content: "DECRYPTION LOGIC [SHIFT -3]:\A W -> T\A D -> A\A U -> R\A J -> G\A H -> E\A W -> T\A ========================\A FINAL ANSWER: TARGET\A (TYPE 'TARGET' TO BYPASS)";
            position: absolute;
            bottom: 125%; 
            left: 50%;
            transform: translateX(-50%); 
            width: max-content; 
            max-width: 80vw; 
            background: #020a02;
            border: 2px solid #6bc26b;
            padding: 15px;
            white-space: pre-wrap; 
            z-index: 10;
            box-shadow: 0 0 15px #000;
            pointer-events: none;
            color: #6bc26b;
            line-height: 1.2;
            text-align: left;
        }
    </style>
</head>
<body>

<div id="chassis">
    <div class="rivet r-tl"></div>
    <div class="rivet r-tr"></div>
    <div class="rivet r-bl"></div>
    <div class="rivet r-br"></div>
    <div id="screen">
        <div id="output"></div>
        <div id="input-line">
            <span id="prompt">SYS_INIT></span>
            <input type="text" id="cmd" autocomplete="off" autofocus>
        </div>
        <div id="command-bar">
            <span class="cmd-block" data-desc="Survey immediate surroundings for targets.">OBSERVE</span>
            <span class="cmd-block" data-desc="Check system and tracking risk metrics.">STATUS</span>
            <span class="cmd-block" data-desc="Scan bracketed targets (e.g., SEARCH DESK).">SEARCH [X]</span>
            <span class="cmd-block" data-desc="Acquire physical assets.">TAKE [X]</span>
            <span class="cmd-block" data-desc="Open locked assets (e.g., UNLOCK SAFE 123)">UNLOCK [X] [PIN]</span>
            <span class="cmd-block" data-desc="Amplify radio output. High detection risk.">BOOST_SIG</span>
            <span class="cmd-block" data-desc="Single-use. Confounds enemy Direction Finding.">JAM_FREQ</span>
            <span class="cmd-block" data-desc="Contact Allied Command for mission parameters.">COMM_HQ</span>
            <span class="cmd-block" data-desc="Override root directory. Requires DOSSIER.">HACK_ROOT</span>
            <span class="cmd-block" data-desc="Authorize localized artillery. Needs grid vector.">CALL_STRIKE [X]</span>
            <span class="cmd-block" data-desc="Request extraction transport vector.">REQ_EXTRACT</span>
        </div>
    </div>
</div>

<script>
    const outputDiv = document.getElementById('output');
    const inputField = document.getElementById('cmd');
    const promptSpan = document.getElementById('prompt');
    const commandBar = document.getElementById('command-bar');
    const chassis = document.getElementById('chassis');
    const screen = document.getElementById('screen');

    let state = 'DIFFICULTY_SELECT';
    let isTyping = false;
    let easyMode = false;
    
    let alertLevel = 0;
    let signalBoosted = 0; 
    let triangulationRisk = 0;
    let jammerUsed = false;
    
    let traceActive = false;
    let traceLimit = 15;
    let strikeCalled = false;
    
    let inventory = [];
    let environment = {
        'DESK': ['COMPASS', 'MAP', 'BRASS_CASING', 'STALE_BREAD'],
        'LOCKER': ['DOSSIER', 'WOOL_SOCKS', 'LUNCHBOX'],
        'SAFE': ['OVERRIDE_KEY'] 
    };
    let safeLocked = true;

    let audioCtx;
    let staticGainNode;

    const initAudio = () => {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            startStaticNoise();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    };

    const startStaticNoise = () => {
        const bufferSize = audioCtx.sampleRate * 2; 
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        noise.loop = true;
        
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 600; 

        staticGainNode = audioCtx.createGain();
        staticGainNode.gain.value = 0.005; 

        noise.connect(filter);
        filter.connect(staticGainNode);
        staticGainNode.connect(audioCtx.destination);
        noise.start();
    };

    const playClick = () => {
        if (!audioCtx) return;
        const t = audioCtx.currentTime;

        // The "Snap" (Buckling spring - higher pitch, faster decay)
        const oscHigh = audioCtx.createOscillator();
        const gainHigh = audioCtx.createGain();
        oscHigh.type = 'square';
        oscHigh.frequency.setValueAtTime(2200, t); 
        oscHigh.frequency.exponentialRampToValueAtTime(100, t + 0.01); 
        gainHigh.gain.setValueAtTime(0.4, t);
        gainHigh.gain.exponentialRampToValueAtTime(0.001, t + 0.01);
        oscHigh.connect(gainHigh).connect(audioCtx.destination);
        oscHigh.start(t);
        oscHigh.stop(t + 0.01);

        // The "Thud" (Bottoming out against the metal plate - tighter resonance)
        const oscLow = audioCtx.createOscillator();
        const gainLow = audioCtx.createGain();
        oscLow.type = 'triangle';
        oscLow.frequency.setValueAtTime(300, t); 
        oscLow.frequency.exponentialRampToValueAtTime(40, t + 0.035);
        gainLow.gain.setValueAtTime(0.35, t);
        gainLow.gain.exponentialRampToValueAtTime(0.001, t + 0.035);
        oscLow.connect(gainLow).connect(audioCtx.destination);
        oscLow.start(t);
        oscLow.stop(t + 0.035);
    };

    const triggerExplosion = () => {
        if (!audioCtx) return;
        
        const bufferSize = audioCtx.sampleRate * 2;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(400, audioCtx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 1.5);
        
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(2.0, audioCtx.currentTime); 
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2);
        
        noise.connect(filter).connect(gain).connect(audioCtx.destination);
        noise.start();

        let shakeFrames = 0;
        const shakeInterval = setInterval(() => {
            const x = Math.random() * 10 - 5;
            const y = Math.random() * 10 - 5;
            chassis.style.transform = `translate(${x}px, ${y}px)`;
            shakeFrames++;
            if(shakeFrames > 30) {
                clearInterval(shakeInterval);
                chassis.style.transform = "none";
            }
        }, 30);

        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*<>[]{}";
        let glitchCount = 0;
        const glitchInterval = setInterval(() => {
            let str = "";
            for(let i=0; i<800; i++) str += chars.charAt(Math.floor(Math.random()*chars.length));
            outputDiv.innerHTML = `<span style="color:#FFF">${str}</span>`;
            glitchCount++;
            if(glitchCount > 15) {
                clearInterval(glitchInterval);
                powerDown();
            }
        }, 80);
    };

    const powerDown = () => {
        screen.classList.add('power-loss');
        outputDiv.innerHTML = "";
        inputField.style.display = "none";
        commandBar.style.display = "none";
        promptSpan.innerHTML = "<span class='cursor-blink'>_</span>";
        
        if (staticGainNode) {
            staticGainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        }

        setTimeout(rebootSystem, 4000);
    };

    const rebootSystem = () => {
        screen.classList.remove('power-loss');
        promptSpan.innerHTML = "SYS_REBOOT>";
        inputField.style.display = "block";
        inputField.value = "";
        
        promptSpan.classList.remove('trace-warning');
        inputField.classList.remove('trace-warning');
        
        traceActive = false;
        
        if (staticGainNode) {
            staticGainNode.gain.linearRampToValueAtTime(0.005, audioCtx.currentTime + 2);
        }

        printText("AUXILIARY POWER ONLINE.\nSTRUCTURAL INTEGRITY CRITICAL.\nLOCAL ROUTERS: DESTROYED.\nNETWORK TRACE: SEVERED.\n\nEVACUATION MANDATORY. TYPE 'REQ_EXTRACT'.", 40, () => {
            commandBar.style.display = 'flex';
        });
    };

    inputField.addEventListener('input', () => {
        if (inputField.value.trim() !== '') {
            initAudio(); 
            playClick();
        }
    });

    const printText = (text, speed = 30, callback = null) => {
        isTyping = true;
        inputField.disabled = true;
        let i = 0;
        
        if (text.includes('<span')) {
            outputDiv.innerHTML += text + '<br><br>';
            outputDiv.scrollTop = outputDiv.scrollHeight;
            isTyping = false;
            inputField.disabled = false;
            inputField.focus();
            if (callback) callback();
            return;
        }

        const interval = setInterval(() => {
            outputDiv.innerHTML += text.charAt(i);
            if (text.charAt(i) !== ' ' && text.charAt(i) !== '\n') playClick();
            outputDiv.scrollTop = outputDiv.scrollHeight;
            i++;
            if (i >= text.length) {
                clearInterval(interval);
                outputDiv.innerHTML += '<br><br>';
                isTyping = false;
                inputField.disabled = false;
                inputField.focus();
                if (callback) callback();
            }
        }, speed);
    };

    const handleInput = (rawCmd) => {
        if (isTyping) return;
        initAudio();
        const cmd = rawCmd.trim().toUpperCase();
        
        let colorClass = traceActive ? 'style="color:#d9534f"' : 'style="color:#FFF"';
        outputDiv.innerHTML += `<span ${colorClass}>> ${cmd}</span><br>`;
        inputField.value = '';

        if (traceActive && action(cmd) !== 'CALL_STRIKE') {
            traceLimit--;
            promptSpan.innerText = `[TRACE: ${traceLimit}] HQ_LINK>`;
            if (traceLimit <= 0) {
                printText("NETWORK TRACE COMPLETE. ENEMY HAS LOCKED TERMINAL CONTROLS. GESTAPO PATROLS ARRIVING.\n\n*** MISSION FAILED ***", 60, () => {
                    inputField.style.display = 'none';
                    if(staticGainNode) staticGainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 2);
                });
                return;
            }
        }

        switch (state) {
            case 'DIFFICULTY_SELECT':
                processDifficulty(cmd);
                break;
            case 'BOOT':
                processBoot(cmd);
                break;
            case 'CONNECTED':
                processCommand(cmd);
                break;
            case 'CALC_EXTRACT':
                processExtraction(cmd);
                break;
        }
    };

    const action = (cmd) => cmd.split(' ')[0];

    const processDifficulty = (cmd) => {
        if (cmd === '1' || cmd === '2') {
            easyMode = (cmd === '2');
            state = 'BOOT';
            promptSpan.innerText = "C:\\>";
            printText("KONFIGURIEREN HARDWARE...\nWARTEN AUF CATHODE RAY TUBE WARMUP...\nVERBINDUNG GESPERRT. TYPE 'HELP' TO DIAGNOSE.");
        } else {
            printText("UNGÜLTIGE AUSWAHL. ENTER 1 OR 2.");
        }
    };

    const processBoot = (cmd) => {
        if (cmd === 'HELP') {
            let cipherString = easyMode ? '<span class="cipher-hint">WDUJHW</span>' : 'WDUJHW';
            printText(`SYSTEM FEHLER: ALLIED OVERRIDE REQUIRED. ZUGRIFF DENIED.\nAUTHORIZATION CIPHER IN USE: CAESAR SHIFT -3.\nABGEFANGEN KEY: ${cipherString}\nENTER DECRYPTED SCHLÜSSEL:`);
            return;
        }
        
        if (cmd === 'TARGET') {
            printText("ZUGRIFF GEWÄHRT. AUTHORIZATION ACCEPTED. WELCOME TO TERMINAL MK IV.\nTYPE 'HELP' FOR TACTICAL OPERATIONS.", 30, () => {
                state = 'CONNECTED';
                promptSpan.innerText = "HQ_LINK>";
            });
        } else {
            alertLevel++;
            printText(`INVALID KEY. THE GESTAPO HAS BEEN NOTIFIED OF YOUR INCOMPETENCE.\nWARNSTUFE: ${alertLevel}/3. TYPE 'HELP'.`);
            if (alertLevel >= 3) {
                printText("*** CRITICAL ALERT: BUNKER DOORS BREACHED. TERMINAL PURGING. YOU HAVE FAILED. ***", 50, () => {
                    inputField.style.display = 'none';
                    if(staticGainNode) staticGainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 2);
                });
            }
        }
    };

    const processCommand = (cmd) => {
        const args = cmd.split(' ');
        const action = args[0];
        const target = args[1];
        const pin = args[2];

        if (action === 'HELP') {
            commandBar.style.display = 'flex';
            printText("COMMAND INTERFACE UNLOCKED. HUD ENGAGED. HOVER OVER BOTTOM COMMANDS FOR ASSISTANCE.");
        } else if (action === 'OBSERVE') {
            printText("YOU ARE IN A DAMP CONCRETE BUNKER.\nTO YOUR LEFT IS A RUSTED METAL [LOCKER].\nIN THE CENTER IS A WOODEN COMMAND [DESK].\nA HEAVY STEEL [SAFE] IS RECESSED INTO THE REAR WALL.\nTHE FLOOR IS LITTERED WITH DEBRIS.");
        } else if (action === 'STATUS') {
            printText(`SYSTEM: NOMINAL.\nOPERATOR STATUS: ALIVE.\nTRIANGULATION RISK: ${triangulationRisk}%\nRADIO AMPLIFICATION: LEVEL ${signalBoosted}\nJAMMER AVAILABLE: ${!jammerUsed}`);
        } else if (action === 'SEARCH') {
            if (!target) {
                printText("SPECIFY TARGET: SEARCH DESK, SEARCH LOCKER, SEARCH SAFE, OR SEARCH MAP.");
            } else if (target === 'SAFE' && safeLocked) {
                printText("THE SAFE IS SECURED WITH A 3-DIGIT MECHANICAL LOCK.\nA GERMAN NOTE IS ATTACHED: 'Die Summe ist neun. Die erste Ziffer ist die Hälfte der zweiten. Die dritte ist null.'\n(TRANSLATION: THE SUM IS 9. THE FIRST DIGIT IS HALF THE SECOND. THE THIRD IS ZERO.)\nUSE 'UNLOCK SAFE [PIN]' TO OPEN.");
            } else if (target === 'MAP') {
                printText("SCANNED MAP. TOPOGRAPHICAL ANALYSIS COMPLETE.\nYOU ARE CURRENTLY LOCATED AT SECTOR VECTOR: 40-X.\nTHIS IS A HIGH-VALUE TARGET LOCATION.");
            } else if (environment[target]) {
                if (environment[target].length > 0) {
                    printText(`SCANNED ${target}. IDENTIFIED ASSETS: ${environment[target].join(', ')}.`);
                } else {
                    printText(`${target} IS EMPTY.`);
                }
            } else {
                printText("TARGET NOT FOUND IN IMMEDIATE VICINITY.");
            }
        } else if (action === 'UNLOCK') {
            if (target === 'SAFE') {
                if (!safeLocked) {
                    printText("SAFE IS ALREADY UNLOCKED.");
                } else if (pin === '360') {
                    safeLocked = false;
                    printText("MECHANICAL TUMBLERS DISENGAGED. SAFE UNLOCKED.\nINSIDE YOU SEE: OVERRIDE_KEY. USE 'TAKE OVERRIDE_KEY' TO ACQUIRE.");
                } else {
                    printText("INCORRECT PIN. THE MECHANISM REMAINS LOCKED.");
                }
            } else {
                printText("SPECIFY A VALID TARGET TO UNLOCK. (E.G., UNLOCK SAFE 123)");
            }
        } else if (action === 'TAKE') {
            if (!target) printText("SPECIFY ITEM TO TAKE.");
            else if (target === 'OVERRIDE_KEY' && safeLocked) {
                printText("YOU CANNOT TAKE THAT. THE SAFE IS STILL LOCKED.");
            } else {
                let found = false;
                for (let key in environment) {
                    const index = environment[key].indexOf(target);
                    if (index > -1) {
                        environment[key].splice(index, 1);
                        inventory.push(target);
                        printText(`ACQUIRED: ${target}. ADDED TO INVENTORY.`);
                        found = true;
                        break;
                    }
                }
                if (!found) printText("ITEM NOT FOUND OR ALREADY ACQUIRED.");
            }
        } else if (action === 'INV') {
            if (inventory.length === 0) printText("INVENTORY EMPTY.");
            else printText(`CURRENT INVENTORY: ${inventory.join(', ')}.`);
        } else if (action === 'BOOST_SIG') {
            if (signalBoosted >= 3) {
                printText("SIGNAL AT MAXIMUM THRESHOLD. EQUIPMENT OVERHEATING.");
            } else {
                signalBoosted++;
                triangulationRisk += 30;
                
                if (staticGainNode) {
                    let newVolume = 0.005 + (signalBoosted * 0.15);
                    staticGainNode.gain.linearRampToValueAtTime(newVolume, audioCtx.currentTime + 1);
                }

                printText(`WARNING: SIGNAL BOOSTED TO LEVEL ${signalBoosted}. CLARITY SECURED.\nCONSEQUENCE: GERMAN RDF STATIONS ARE LOCKING ONTO THIS SECTOR.`);
            }
        } else if (action === 'JAM_FREQ') {
            if (jammerUsed) {
                printText("FREQUENCY JAMMER ALREADY EXPENDED. HARDWARE BURNT OUT.");
            } else {
                jammerUsed = true;
                triangulationRisk = Math.max(0, triangulationRisk - 40);
                printText("ELECTRONIC WARFARE DEPLOYED. BROADBAND WHITE NOISE TRANSMITTED. ENEMY DIRECTION FINDING CONFOUNDED.\nTRIANGULATION RISK SEVERELY REDUCED.");
            }
        } else if (action === 'COMM_HQ') {
            if (signalBoosted === 0) {
                printText("TRANSMISSION FAILED. STATIC INTERFERENCE TOO HIGH. HQ CANNOT HEAR YOU.");
            } else {
                printText(`HQ: "We read you. Listen closely. That bunker contains V2 trajectories. Execute command HACK_ROOT to download them.\nOnce downloaded, USE 'OBSERVE' to map the room. Find and SEARCH the MAP for your grid. Use CALL_STRIKE [GRID] to order artillery on your own position to destroy the facility before escaping. Out."`);
            }
        } else if (action === 'HACK_ROOT') {
            if (inventory.includes('WAR_PLANS')) {
                printText("ROOT DIRECTORY ALREADY COMPROMISED. SCHEMATICS SECURED.");
            } else if (!inventory.includes('DOSSIER')) {
                printText("ACCESS DENIED. ADMINISTRATOR PASSWORD REQUIRED. FIND THE INTEL DOSSIER.");
            } else {
                inventory.push('WAR_PLANS');
                traceActive = true;
                promptSpan.classList.add('trace-warning');
                promptSpan.innerText = `[TRACE: ${traceLimit}] HQ_LINK>`;
                inputField.classList.add('trace-warning');
                
                printText("DOSSIER PASSWORD ACCEPTED. INITIATING MAINFRAME OVERRIDE...\nSUCCESS. V2 SCHEMATICS DOWNLOADED.\n\n*** CRITICAL WARNING ***\nUNAUTHORIZED DOWNLOAD DETECTED. HOSTILE TRACE INITIATED. CALL THE STRIKE BEFORE THE TRACE COMPLETES.");
            }
        } else if (action === 'CALL_STRIKE') {
            if (!target) {
                printText("ERROR: TARGET GRID REQUIRED. (E.G., CALL_STRIKE 00-X)");
            } else if (target !== '40-X') {
                printText(`HQ: "Negative. Artillery reports ${target} is empty terrain. Verify your grid on the MAP."`);
            } else if (!inventory.includes('WAR_PLANS')) {
                printText(`HQ: "Negative. We cannot bomb that bunker until you have downloaded the WAR_PLANS. Secure the intel first."`);
            } else {
                strikeCalled = true;
                isTyping = true;
                inputField.disabled = true;
                printText("COORDINATES CONFIRMED. ARTILLERY INBOUND. BRACE FOR IMPACT.", 40, triggerExplosion);
            }
        } else if (action === 'REQ_EXTRACT') {
            if (signalBoosted === 0) {
                printText("TRANSMISSION FAILED. SIGNAL WEAK.");
            } else if (!strikeCalled) {
                printText(`HQ: "NEGATIVE ON EXTRACTION. YOU MUST CALL THE STRIKE TO DESTROY THE FACILITY FIRST."`);
            } else if (!inventory.includes('COMPASS') || !inventory.includes('OVERRIDE_KEY')) {
                printText(`HQ: "NEGATIVE ON EXTRACTION. YOU NEED THE OVERRIDE_KEY AND A COMPASS TO NAVIGATE TO THE LZ. SECURE THEM."`);
            } else {
                state = 'CALC_EXTRACT';
                promptSpan.innerText = "HQ_LINK>";
                
                let timeWindow = 45 - (triangulationRisk * 0.35); 
                printText(`HQ CONNECTED.\n"Assets confirmed. The bunker is gone. We are holding a C-47 transport at Sector Grid 70-X."\n"You are currently at Sector Grid 40-X. The distance is exactly 30 kilometers."\n"You must travel at a sprint pace of 10 kilometers per hour."\n"Due to enemy convergence, we can only keep the plane waiting for ${timeWindow.toFixed(1)} hours."\n\nCALCULATE: How many hours will it take you to reach the transport?\nENTER HOURS:`);
            }
        } else {
            printText("COMMAND UNRECOGNIZED. FOCUS ON THE MISSION.");
        }
    };

    const processExtraction = (cmd) => {
        let answer = parseFloat(cmd);
        if (answer === 3) {
            let timeWindow = 45 - (triangulationRisk * 0.35);
            if (3 <= timeWindow) {
                printText("COORDINATES LOCKED. THE MATH CHECKS OUT.\nGRAB YOUR GEAR. WE WILL SEE YOU IN LONDON.\n\n*** MISSION SUCCESS ***", 40, () => {
                    inputField.style.display = 'none';
                    if(staticGainNode) staticGainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 3); 
                });
            } else {
                printText("THE MATH IS CORRECT, BUT YOU TOOK TOO LONG TO MANAGE YOUR SIGNAL RISKS. THE PLANE LEFT.\nYOUR DECISIONS BROUGHT THE PATROLS TOO FAST.\n\n*** MISSION FAILED ***", 60, () => {
                    inputField.style.display = 'none';
                });
            }
        } else {
            triangulationRisk += 5; 
            printText("INCORRECT CALCULATION. TIME IS RUNNING OUT. TRY AGAIN:");
        }
    };

    printText("SYSTEM AKTIVIERT. TERMINAL POWERED ON.\nBITTE CHOOSE YOUR PROTOCOL:\n[1] NORMAL OP (STANDARD VERSCHLÜSSELUNG)\n[2] TRAINING OP (ASSISTED ENTSCHLÜSSELUNG)\nENTER EINGABE:");

    inputField.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            handleInput(inputField.value);
        }
    });
</script>
