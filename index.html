<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Terminal Mk IV - Operation Vanguard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #020202;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'VT323', monospace;
            overflow: hidden;
            user-select: none;
        }

        #chassis {
            background-color: #1e201d;
            width: 96vw;
            height: 96vh;
            padding: 40px;
            border-radius: 20px;
            box-sizing: border-box;
            box-shadow: inset 0 0 20px #000, 0 0 50px rgba(0,0,0,1);
            border: 8px solid #0a0b0a;
            position: relative;
            display: flex;
            flex-direction: column;
            transition: transform 0.05s, border-color 0.3s;
        }

        .rivet {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #111;
            border-radius: 50%;
            box-shadow: inset 2px 2px 4px #333, inset -2px -2px 4px #000;
        }
        .r-tl { top: 12px; left: 12px; }
        .r-tr { top: 12px; right: 12px; }
        .r-bl { bottom: 12px; left: 12px; }
        .r-br { bottom: 12px; right: 12px; }

        #screen {
            background: #030a03;
            width: 100%;
            height: 100%;
            border-radius: 60px / 40px; 
            padding: 35px;
            box-sizing: border-box;
            box-shadow: inset 0 0 120px rgba(0,0,0,1), 0 0 10px rgba(107,194,107,0.05);
            border: 12px solid #050505;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: #6bc26b; 
            text-shadow: 
                -1.5px 0 1px rgba(255, 0, 0, 0.4), 
                1.5px 0 1px rgba(0, 0, 255, 0.4), 
                0 0 3px #6bc26b, 
                0 0 8px rgba(107, 194, 107, 0.3); 
            font-size: 1.8rem;
            letter-spacing: 2px;
            animation: flicker 0.12s infinite;
            transition: background 0.5s, opacity 0.5s;
        }

        @keyframes intrusionPulse {
            0% { box-shadow: inset 0 0 120px rgba(0,0,0,1), 0 0 10px rgba(217, 83, 79, 0.2); border-color: #050505; }
            50% { box-shadow: inset 0 0 120px rgba(150, 20, 20, 0.5), 0 0 30px rgba(217, 83, 79, 0.5); border-color: #4a1111; }
            100% { box-shadow: inset 0 0 120px rgba(0,0,0,1), 0 0 10px rgba(217, 83, 79, 0.2); border-color: #050505; }
        }
        .intrusion-active {
            animation: intrusionPulse 1s infinite !important;
            color: #d9534f !important;
            text-shadow: -1.5px 0 1px rgba(0, 0, 255, 0.4), 1.5px 0 1px rgba(255, 255, 0, 0.4), 0 0 4px #d9534f !important;
        }

        .power-loss {
            background: #000 !important;
            box-shadow: none !important;
            text-shadow: none !important;
        }
        .power-loss::after, .power-loss::before {
            display: none !important;
        }

        @keyframes flicker {
            0% { opacity: 0.97; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }

        #screen::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            z-index: 4;
            background-size: 100% 4px;
            pointer-events: none;
        }

        #screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.6) 85%, rgba(0,0,0,1) 100%);
            z-index: 5;
            pointer-events: none;
        }

        #output {
            flex-grow: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            margin-bottom: 10px;
            padding-right: 15px;
            z-index: 3;
            line-height: 1.2;
            word-wrap: break-word;
        }

        #input-line {
            display: flex;
            align-items: center;
            font-weight: bold;
            z-index: 3;
            margin-bottom: 10px;
        }

        #prompt { margin-right: 15px; transition: color 0.3s; }
        .trace-warning { color: #d9534f; text-shadow: -1.5px 0 1px rgba(0,0,255,0.4), 0 0 4px #d9534f; } 
        
        .cursor-blink {
            animation: blinker 1s linear infinite;
            color: inherit;
        }
        @keyframes blinker {
            50% { opacity: 0; }
        }

        input[type="text"] {
            background: transparent;
            border: none;
            color: inherit;
            font-family: 'VT323', monospace;
            font-size: 1em;
            flex-grow: 1;
            outline: none;
            text-transform: uppercase;
            text-shadow: inherit;
            letter-spacing: 2px;
        }

        #command-bar {
            display: none; 
            border-top: 2px solid #2d5a2d;
            padding-top: 10px;
            margin-top: auto;
            font-size: 1.3rem;
            color: #4a8f4a;
            text-shadow: none;
            z-index: 3;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .cmd-block { 
            border-right: 2px solid #2d5a2d; 
            padding-right: 12px; 
            margin-right: 12px; 
            margin-bottom: 5px;
            position: relative;
            cursor: help;
            color: #5ebd5e;
        }
        
        .cmd-block:last-child { border-right: none; }

        .cmd-block:hover::after {
            content: attr(data-desc);
            position: absolute;
            bottom: 140%;
            left: 50%;
            transform: translateX(-50%);
            width: max-content;
            max-width: 300px;
            background: #020a02;
            border: 2px solid #6bc26b;
            padding: 10px;
            white-space: pre-wrap;
            color: #6bc26b;
            z-index: 20;
            box-shadow: 0 0 10px rgba(0,0,0,0.8);
            pointer-events: none;
            font-size: 1.2rem;
            text-align: center;
            text-shadow: none;
        }

        .cipher-hint {
            cursor: help;
            border-bottom: 2px dotted #6bc26b;
            position: relative;
            color: #e6e6b8; 
            text-shadow: none;
        }
        
        .cipher-hint:hover::after {
            content: "DECRYPTION LOGIC [SHIFT -3]:\A W -> T\A D -> A\A U -> R\A J -> G\A H -> E\A W -> T\A ========================\A FINAL ANSWER: TARGET\A (TYPE 'TARGET' TO BYPASS)";
            position: absolute;
            bottom: 125%; 
            left: 50%;
            transform: translateX(-50%); 
            width: max-content; 
            max-width: 80vw; 
            background: #020a02;
            border: 2px solid #6bc26b;
            padding: 15px;
            white-space: pre-wrap; 
            z-index: 10;
            box-shadow: 0 0 15px #000;
            pointer-events: none;
            color: #6bc26b;
            line-height: 1.2;
            text-align: left;
            text-shadow: none;
        }

        .hash-hint {
            cursor: help;
            border-bottom: 2px dotted #d9534f;
            position: relative;
            color: #ffcccc; 
            text-shadow: none;
        }

        .hash-hint:hover::after {
            content: "SYSTEM ASSIST: TYPE '" attr(data-hash) "' TO REPEL ATTACK";
            position: absolute;
            bottom: 125%; 
            left: 50%;
            transform: translateX(-50%); 
            width: max-content; 
            background: #2a0505;
            border: 2px solid #d9534f;
            padding: 15px;
            white-space: pre-wrap; 
            z-index: 10;
            box-shadow: 0 0 15px #000;
            pointer-events: none;
            color: #d9534f;
            line-height: 1.2;
            font-weight: bold;
            text-shadow: none;
        }
    </style>
</head>
<body>

<div id="chassis">
    <div class="rivet r-tl"></div>
    <div class="rivet r-tr"></div>
    <div class="rivet r-bl"></div>
    <div class="rivet r-br"></div>
    <div id="screen">
        <div id="output"></div>
        <div id="input-line">
            <span id="prompt">SYS_INIT></span>
            <input type="text" id="cmd" autocomplete="off" autofocus>
        </div>
        <div id="command-bar">
            <span class="cmd-block" data-desc="Survey immediate surroundings for targets.">OBSERVE</span>
            <span class="cmd-block" data-desc="Check mission parameters and tracking metrics.">STATUS</span>
            <span class="cmd-block" data-desc="Scan bracketed targets (e.g., SEARCH DESK).">SEARCH [X]</span>
            <span class="cmd-block" data-desc="Acquire physical assets.">TAKE [X]</span>
            <span class="cmd-block" data-desc="Examine acquired inventory items (e.g., READ DOSSIER)">READ [X]</span>
            <span class="cmd-block" data-desc="Repair hardware using inventory items.">FIX [X]</span>
            <span class="cmd-block" data-desc="Override root directory. Requires password.">HACK_ROOT</span>
            <span class="cmd-block" data-desc="Contact Allied Command for tactical guidance.">COMM_HQ</span>
            <span class="cmd-block" data-desc="Scramble trace. Requires Jammer.">JAM_FREQ</span>
            <span class="cmd-block" data-desc="Request extraction transport vector.">REQ_EXTRACT</span>
        </div>
    </div>
</div>

<script>
    const outputDiv = document.getElementById('output');
    const inputField = document.getElementById('cmd');
    const promptSpan = document.getElementById('prompt');
    const commandBar = document.getElementById('command-bar');
    const chassis = document.getElementById('chassis');
    const screen = document.getElementById('screen');

    let state = 'DIFFICULTY_SELECT';
    let previousState = '';
    let isTyping = false;
    let easyMode = false;
    
    let alertLevel = 0;
    let signalBoosted = 0; 
    let triangulationRisk = 0;
    
    let traceActive = false;
    let traceLimit = 15;
    let strikeCalled = false;
    let radioFixed = false;
    let navyContacted = false;
    let jammerUsed = false;
    
    let intrusionDefenseTimer = null;
    let currentDefenseHash = "";
    let pendingDownload = "";
    let rdfDefenseTimer = null;
    
    let inventory = [];
    let environment = {
        'DESK': ['COMPASS', 'MAP', 'BRASS_CASING'],
        'LOCKER': ['DOSSIER', 'VACUUM_TUBE', 'WOOL_SOCKS'],
        'SAFE': ['OVERRIDE_KEY', 'BLUEPRINT']
    };
    let safeLocked = true;

    let audioCtx;
    let staticGainNode;
    let keyNoiseBuffer;

    const wolfQuotes = [
        "ACHTUNG. I SEE YOUR CONNECTION, LITTLE MOUSE.",
        "YOUR FIREWALL IS PAPER. I AM TEARING IT DOWN.",
        "BERLIN COMMAND HAS YOUR TRACE. DIE GESTAPO KOMMT.",
        "YOU TYPE LIKE A TERRIFIED CHILD. SURRENDER."
    ];

    const initAudio = () => {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            startStaticNoise();
            createKeyNoiseBuffer();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    };

    const createKeyNoiseBuffer = () => {
        const bufferSize = audioCtx.sampleRate * 0.05; 
        keyNoiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const output = keyNoiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1; 
    };

    const startStaticNoise = () => {
        const bufferSize = audioCtx.sampleRate * 2; 
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        noise.loop = true;
        
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 600; 

        staticGainNode = audioCtx.createGain();
        staticGainNode.gain.value = 0.005; 

        noise.connect(filter);
        filter.connect(staticGainNode);
        staticGainNode.connect(audioCtx.destination);
        noise.start();
    };

    // DOUBLE-TRANSIENT ACOUSTIC ENGINE
    const playKeyDown = () => {
        if (!audioCtx || !keyNoiseBuffer) return;
        const t = audioCtx.currentTime;

        // Deep bottom-out clack
        const oscLow = audioCtx.createOscillator();
        const gainLow = audioCtx.createGain();
        oscLow.type = 'triangle';
        oscLow.frequency.setValueAtTime(150, t); 
        oscLow.frequency.exponentialRampToValueAtTime(40, t + 0.03);
        gainLow.gain.setValueAtTime(0.5, t);
        gainLow.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
        oscLow.connect(gainLow).connect(audioCtx.destination);
        oscLow.start(t);
        oscLow.stop(t + 0.03);

        // Plastic friction
        const noiseSource = audioCtx.createBufferSource();
        noiseSource.buffer = keyNoiseBuffer;
        const noiseFilter = audioCtx.createBiquadFilter();
        noiseFilter.type = 'bandpass';
        noiseFilter.frequency.value = 800 + (Math.random() * 200); 
        const noiseGain = audioCtx.createGain();
        noiseGain.gain.setValueAtTime(0.4, t);
        noiseGain.gain.exponentialRampToValueAtTime(0.01, t + 0.015);
        noiseSource.connect(noiseFilter).connect(noiseGain).connect(audioCtx.destination);
        noiseSource.start(t);
    };

    const playKeyUp = () => {
        if (!audioCtx || !keyNoiseBuffer) return;
        const t = audioCtx.currentTime;

        // Higher, lighter spring reset snap
        const oscHigh = audioCtx.createOscillator();
        const gainHigh = audioCtx.createGain();
        oscHigh.type = 'sine';
        oscHigh.frequency.setValueAtTime(400, t); 
        oscHigh.frequency.exponentialRampToValueAtTime(100, t + 0.015);
        gainHigh.gain.setValueAtTime(0.15, t);
        gainHigh.gain.exponentialRampToValueAtTime(0.001, t + 0.015);
        oscHigh.connect(gainHigh).connect(audioCtx.destination);
        oscHigh.start(t);
        oscHigh.stop(t + 0.015);
    };

    // Attach dual event listeners for physical typing
    inputField.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter' && e.key !== 'Shift') playKeyDown();
    });
    inputField.addEventListener('keyup', (e) => {
        if (e.key !== 'Enter' && e.key !== 'Shift') playKeyUp();
    });

    const triggerExplosion = () => {
        if (!audioCtx) return;
        
        const bufferSize = audioCtx.sampleRate * 2;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(400, audioCtx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 1.5);
        
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(2.0, audioCtx.currentTime); 
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2);
        
        noise.connect(filter).connect(gain).connect(audioCtx.destination);
        noise.start();

        let shakeFrames = 0;
        const shakeInterval = setInterval(() => {
            const x = Math.random() * 10 - 5;
            const y = Math.random() * 10 - 5;
            chassis.style.transform = `translate(${x}px, ${y}px)`;
            shakeFrames++;
            if(shakeFrames > 30) {
                clearInterval(shakeInterval);
                chassis.style.transform = "none";
            }
        }, 30);

        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*<>[]{}";
        let glitchCount = 0;
        const glitchInterval = setInterval(() => {
            let str = "";
            for(let i=0; i<800; i++) str += chars.charAt(Math.floor(Math.random()*chars.length));
            outputDiv.innerHTML = `<span style="color:#6bc26b">${str}</span>`;
            glitchCount++;
            if(glitchCount > 15) {
                clearInterval(glitchInterval);
                powerDown();
            }
        }, 80);
    };

    const powerDown = () => {
        clearTimeout(intrusionDefenseTimer);
        screen.classList.remove('intrusion-active');

        screen.classList.add('power-loss');
        outputDiv.innerHTML = "";
        inputField.style.display = "none";
        commandBar.style.display = "none";
        promptSpan.innerHTML = "<span class='cursor-blink'>_</span>";
        
        if (staticGainNode) staticGainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        setTimeout(rebootSystem, 4000);
    };

    const rebootSystem = () => {
        screen.classList.remove('power-loss');
        promptSpan.innerHTML = "SYS_REBOOT>";
        inputField.style.display = "block";
        inputField.value = "";
        
        promptSpan.classList.remove('trace-warning');
        inputField.classList.remove('trace-warning');
        
        traceActive = false;
        
        if (staticGainNode) {
            staticGainNode.gain.linearRampToValueAtTime(0.005, audioCtx.currentTime + 2);
        }

        printText("AUXILIARY POWER ONLINE.\nSTRUCTURAL INTEGRITY CRITICAL.\nLOCAL ROUTERS: DESTROYED.\nNETWORK TRACE: SEVERED.\n\nEVACUATION MANDATORY. TYPE 'REQ_EXTRACT'.", 40, () => {
            commandBar.style.display = 'flex';
        });
    };

    // --- CYBER WARFARE / DIGITAL INTRUSION ---

    const generateHash = () => {
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        let hash = "";
        for(let i=0; i<4; i++) hash += chars.charAt(Math.floor(Math.random() * chars.length));
        return hash;
    };

    const triggerIntrusion = (nodeTarget) => {
        previousState = state;
        state = 'INTRUSION_DEFENSE';
        currentDefenseHash = generateHash();
        pendingDownload = nodeTarget;
        
        isTyping = true;
        inputField.disabled = true;

        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*<>[]{}";
        let glitchCount = 0;
        
        const glitchInterval = setInterval(() => {
            let str = "";
            for(let i=0; i<400; i++) str += chars.charAt(Math.floor(Math.random()*chars.length));
            outputDiv.innerHTML = `<span style="color:#d9534f">${str}</span>`;
            glitchCount++;
            if(glitchCount > 5) { 
                clearInterval(glitchInterval);
                outputDiv.innerHTML = ""; 
                executeWolfThreat();
            }
        }, 80);
    };

    const executeWolfThreat = () => {
        screen.classList.add('intrusion-active');
        promptSpan.innerText = "SSWOLF_DAEMON>";
        promptSpan.classList.add('trace-warning');
        
        const randomQuote = wolfQuotes[Math.floor(Math.random() * wolfQuotes.length)];
        let hashString = easyMode ? `<span class="hash-hint" data-hash="${currentDefenseHash}">[${currentDefenseHash}]</span>` : `[${currentDefenseHash}]`;

        printText(`*** SECURITY BREACH ***\n"${randomQuote}"\n\nDOWNLOAD BLOCKED. KERNEL PANIC IMMINENT.\nYOU HAVE 12 SECONDS TO OVERRIDE THE PACKET DROP.\nTYPE OVERRIDE HASH: ${hashString}`, 20, () => {
            intrusionDefenseTimer = setTimeout(failIntrusion, 12000);
        });
    };

    const failIntrusion = () => {
        screen.classList.remove('intrusion-active');
        promptSpan.classList.remove('trace-warning');
        promptSpan.innerText = `[TRACE: ${traceLimit}] HQ_LINK>`;
        
        state = 'CONNECTED';
        
        printText("DEFENSE FAILED. FIREWALL BREACHED. CONNECTION TO ROOT DIRECTORY SEVERED BY SSWOLF_DAEMON.\nYOU WERE EXPELLED FROM THE MAINFRAME BACK TO LOCAL SYSTEMS.\nYOU MUST RE-EXECUTE 'HACK_ROOT' TO PROCEED.");
    };

    const resolveIntrusion = (cmd) => {
        clearTimeout(intrusionDefenseTimer);
        screen.classList.remove('intrusion-active');
        promptSpan.classList.remove('trace-warning');
        promptSpan.innerText = `[TRACE: ${traceLimit}] HQ_LINK>`;
        
        if (cmd === currentDefenseHash) {
            state = 'CONNECTED'; 
            
            let itemName = "";
            if (pendingDownload === 'NODE_V2_TRAJ') itemName = 'WAR_PLANS';
            if (pendingDownload === 'NODE_UBOAT_COORD') itemName = 'UBOAT_COORD';
            if (pendingDownload === 'NODE_PROJEKT_ATLAS') itemName = 'ATLAS_INTEL';
            
            if (!inventory.includes(itemName)) inventory.push(itemName);

            printText(`OVERRIDE ACCEPTED. SSWOLF_DAEMON BYPASSED.\nDOWNLOAD COMPLETE. ${itemName} ADDED TO LOCAL INVENTORY.\nDISCONNECTING FROM MAINFRAME TO AVOID DETECTION... DROPPED TO LOCAL SHELL.`);
        } else {
            failIntrusion();
        }
    };

    // --- KINETIC SCRAMBLE (GESTAPO RDF RAID) ---

    const triggerRDFIntercept = () => {
        previousState = state;
        state = 'RDF_SCRAMBLE';
        
        screen.classList.add('intrusion-active');
        promptSpan.innerText = "CRITICAL_WARN>";
        promptSpan.classList.add('trace-warning');
        
        printText("*** GESTAPO RDF TRIANGULATION LOCKED ***\nEXCESSIVE RADIO AMPLIFICATION DETECTED. HEAVY INFANTRY DISPATCHED TO YOUR COORDINATES.\nYOU HAVE 15 SECONDS TO SCRAMBLE THE FREQUENCY OR BE OVERRUN.\nREQUIREMENT: DEPLOY JAM_FREQ COMMAND NOW.", 30, () => {
            rdfDefenseTimer = setTimeout(failRDFIntercept, 15000);
        });
    };

    const failRDFIntercept = () => {
        screen.classList.remove('intrusion-active');
        inputField.style.display = 'none';
        printText("\n*** DOOR BREACH DETECTED. GESTAPO PATROL HAS SECURED THE ROOM. ***\nMISSION FAILED. YOU HAVE BEEN CAPTURED.", 50);
    };

    const resolveRDFIntercept = (cmd) => {
        if (cmd === 'JAM_FREQ') {
            clearTimeout(rdfDefenseTimer);
            screen.classList.remove('intrusion-active');
            promptSpan.classList.remove('trace-warning');
            promptSpan.innerText = previousState === 'MAINFRAME' ? `[TRACE: ${traceLimit}] ROOT@BERLIN>` : "HQ_LINK>";
            
            jammerUsed = true;
            triangulationRisk = Math.max(0, triangulationRisk - 40);
            state = previousState;
            
            printText("ELECTRONIC WARFARE DEPLOYED. BROADBAND WHITE NOISE TRANSMITTED.\nGESTAPO RDF LOCK SEVERED. PATROLS DIVERTED.\nTRIANGULATION RISK REDUCED. RETURNING TO PREVIOUS SHELL.");
        } else {
            printText("INVALID COMMAND. YOU MUST SCRAMBLE THE SIGNAL (JAM_FREQ) IMMEDIATELY.");
        }
    };

    // --- PRINT ENGINE ---

    const printText = (text, speed = 30, callback = null) => {
        isTyping = true;
        inputField.disabled = true;
        let i = 0;
        
        if (text.includes('<span')) {
            outputDiv.innerHTML += text + '<br><br>';
            outputDiv.scrollTop = outputDiv.scrollHeight;
            isTyping = false;
            inputField.disabled = false;
            inputField.focus();
            if (callback) callback();
            return;
        }

        const interval = setInterval(() => {
            if((state === 'INTRUSION_DEFENSE' || state === 'RDF_SCRAMBLE') && !text.includes('SECURITY BREACH') && !text.includes('GESTAPO RDF')) {
                clearInterval(interval);
                return;
            }

            outputDiv.innerHTML += text.charAt(i);
            
            // Play mechanical downstroke for programmatic printing
            if (text.charAt(i) !== ' ' && text.charAt(i) !== '\n') playKeyDown();
            
            outputDiv.scrollTop = outputDiv.scrollHeight;
            i++;
            if (i >= text.length) {
                clearInterval(interval);
                outputDiv.innerHTML += '<br><br>';
                isTyping = false;
                inputField.disabled = false;
                inputField.focus();
                if (callback) callback();
            }
        }, speed);
    };

    const handleInput = (rawCmd) => {
        if (isTyping) return;
        initAudio();
        const cmd = rawCmd.trim().toUpperCase();
        
        if (state === 'INTRUSION_DEFENSE') {
            outputDiv.innerHTML += `<span style="color:#FFF">> ${cmd}</span><br>`;
            inputField.value = '';
            resolveIntrusion(cmd);
            return;
        }

        if (state === 'RDF_SCRAMBLE') {
            outputDiv.innerHTML += `<span style="color:#FFF">> ${cmd}</span><br>`;
            inputField.value = '';
            resolveRDFIntercept(cmd);
            return;
        }
        
        let colorClass = traceActive ? 'style="color:#d9534f"' : 'style="color:#6bc26b"';
        outputDiv.innerHTML += `<span ${colorClass}>> ${cmd}</span><br>`;
        inputField.value = '';

        if (state === 'HACK_AUTH') {
            processHackAuth(cmd);
            return;
        }

        if (traceActive && action(cmd) !== 'CALL_STRIKE' && state !== 'CALC_EXTRACT') {
            traceLimit--;
            promptSpan.innerText = `[TRACE: ${traceLimit}] ${state === 'MAINFRAME' ? 'ROOT@BERLIN>' : 'HQ_LINK>'}`;
            if (traceLimit <= 0) {
                printText("NETWORK TRACE COMPLETE. ENEMY HAS LOCKED TERMINAL CONTROLS. GESTAPO PATROLS ARRIVING.\n\n*** MISSION FAILED ***", 60, () => {
                    inputField.style.display = 'none';
                    if(staticGainNode) staticGainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 2);
                });
                return;
            }
        }

        switch (state) {
            case 'DIFFICULTY_SELECT':
                processDifficulty(cmd);
                break;
            case 'BOOT':
                processBoot(cmd);
                break;
            case 'CONNECTED':
                processCommand(cmd);
                break;
            case 'MAINFRAME':
                processMainframe(cmd);
                break;
            case 'CALC_EXTRACT':
                processExtraction(cmd);
                break;
        }
    };

    const action = (cmd) => cmd.split(' ')[0];

    const processDifficulty = (cmd) => {
        if (cmd === '1' || cmd === '2') {
            easyMode = (cmd === '2');
            state = 'BOOT';
            promptSpan.innerText = "C:\\>";
            printText("KONFIGURIEREN HARDWARE...\nWARTEN AUF CATHODE RAY TUBE WARMUP...\nVERBINDUNG GESPERRT. TYPE 'HELP' TO DIAGNOSE.");
        } else {
            printText("UNGÜLTIGE AUSWAHL. ENTER 1 OR 2.");
        }
    };

    const processBoot = (cmd) => {
        if (cmd === 'HELP') {
            let cipherString = easyMode ? '<span class="cipher-hint">WDUJHW</span>' : 'WDUJHW';
            printText(`SYSTEM FEHLER: ALLIED OVERRIDE REQUIRED. ZUGRIFF DENIED.\nAUTHORIZATION CIPHER IN USE: CAESAR SHIFT -3.\nABGEFANGEN KEY: ${cipherString}\nENTER DECRYPTED SCHLÜSSEL:`);
            return;
        }
        
        if (cmd === 'TARGET') {
            printText("ZUGRIFF GEWÄHRT. AUTHORIZATION ACCEPTED. WELCOME TO TERMINAL MK IV.\nTYPE 'HELP' FOR TACTICAL OPERATIONS.", 30, () => {
                state = 'CONNECTED';
                promptSpan.innerText = "HQ_LINK>";
            });
        } else {
            alertLevel++;
            printText(`INVALID KEY. THE GESTAPO HAS BEEN NOTIFIED OF YOUR INCOMPETENCE.\nWARNSTUFE: ${alertLevel}/3. TYPE 'HELP'.`);
            if (alertLevel >= 3) {
                printText("*** CRITICAL ALERT: BUNKER DOORS BREACHED. TERMINAL PURGING. YOU HAVE FAILED. ***", 50, () => {
                    inputField.style.display = 'none';
                    if(staticGainNode) staticGainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 2);
                });
            }
        }
    };

    const processMainframe = (cmd) => {
        const args = cmd.split(' ');
        const action = args[0];
        const target = args[1];

        if (action === 'HELP') {
            printText("MAINFRAME COMMANDS:\n- SCAN_NET      : LOCATE ENCRYPTED DATA NODES\n- DOWNLOAD [X]  : EXTRACT DATA FROM NODE\n- ABORT_HACK    : DISCONNECT AND RETURN TO LOCAL SHELL");
        } else if (action === 'SCAN_NET') {
            printText("SCANNING ENCRYPTED GERMAN SECTORS...\nFOUND: NODE_V2_TRAJ (ARTILLERY TARGETS)\nFOUND: NODE_UBOAT_COORD (NAVAL KRIEGSMARINE)\nFOUND: NODE_PROJEKT_ATLAS (EXPERIMENTAL)");
        } else if (action === 'DOWNLOAD') {
            if (!target) {
                printText("SPECIFY NODE TO DOWNLOAD.");
            } else if (target === 'NODE_V2_TRAJ' || target === 'NODE_UBOAT_COORD' || target === 'NODE_PROJEKT_ATLAS') {
                triggerIntrusion(target);
            } else {
                printText("NODE NOT FOUND. VERIFY SYNTAX VIA SCAN_NET.");
            }
        } else if (action === 'ABORT_HACK') {
            state = 'CONNECTED';
            promptSpan.innerText = `[TRACE: ${traceLimit}] HQ_LINK>`;
            printText("ABORTING CONNECTION. DROPPING BACK TO PHYSICAL SHELL.");
        } else {
            printText("COMMAND UNRECOGNIZED IN DIGITAL MAINFRAME. TYPE 'HELP'.");
        }
    };

    const processHackAuth = (cmd) => {
        if (cmd === 'VALKYRIE') {
            state = 'MAINFRAME';
            traceActive = true;
            promptSpan.classList.add('trace-warning');
            promptSpan.innerText = `[TRACE: ${traceLimit}] ROOT@BERLIN>`;
            inputField.classList.add('trace-warning');
            printText("ADMINISTRATOR PASSWORD ACCEPTED. MAINFRAME INFILTRATED.\n\n*** CRITICAL WARNING ***\nUNAUTHORIZED ACCESS DETECTED. HOSTILE TRACE INITIATED.\nTYPE 'HELP' FOR DIGITAL COMMANDS.");
        } else if (cmd === 'ABORT') {
            state = 'CONNECTED';
            promptSpan.innerText = "HQ_LINK>";
            printText("HACK ABORTED. RETURNED TO LOCAL SHELL.");
        } else {
            printText("ACCESS DENIED. INCORRECT PASSWORD. TYPE 'ABORT' TO EXIT OR TRY AGAIN.\nPASSWORD>");
        }
    };

    const processCommand = (cmd) => {
        const args = cmd.split(' ');
        const action = args[0];
        const target = args[1];
        const pin = args[2];

        if (action === 'HELP') {
            commandBar.style.display = 'flex';
            printText("COMMAND INTERFACE UNLOCKED. HUD ENGAGED. HOVER OVER BOTTOM COMMANDS FOR ASSISTANCE.");
        } else if (action === 'OBSERVE') {
            printText("YOU ARE IN A DAMP CONCRETE BUNKER.\nTO YOUR LEFT IS A RUSTED METAL [LOCKER].\nIN THE CENTER IS A WOODEN COMMAND [DESK].\nA HEAVY STEEL [SAFE] IS RECESSED INTO THE REAR WALL.\nTHE FLOOR IS LITTERED WITH DEBRIS.");
        } else if (action === 'STATUS') {
            printText(`MISSION PARAMETERS:\nOPERATIVE INFILTRATED BEHIND ENEMY LINES.\nOBJECTIVE: REPAIR RADIO, INFILTRATE COMMUNICATION MAINFRAME, SECURE INTEL, AND EXTRACT.\n\nSYSTEM: NOMINAL.\nRADIO LINK: ${radioFixed ? 'ONLINE' : 'OFFLINE (HARDWARE FAULT)'}\nTRIANGULATION RISK: ${triangulationRisk}%\nRADIO AMPLIFICATION: LEVEL ${signalBoosted}`);
        } else if (action === 'SEARCH') {
            if (!target) {
                printText("SPECIFY TARGET: SEARCH DESK, SEARCH LOCKER, SEARCH SAFE, OR SEARCH MAP.");
            } else if (target === 'SAFE' && safeLocked) {
                printText("THE SAFE IS SECURED WITH A 3-DIGIT MECHANICAL LOCK.\nA GERMAN NOTE IS ATTACHED: 'Die Summe ist neun. Die erste Ziffer ist die Hälfte der zweiten. Die dritte ist null.'\nUSE 'UNLOCK SAFE [PIN]' TO OPEN.");
            } else if (target === 'MAP') {
                printText("SCANNED MAP. TOPOGRAPHICAL ANALYSIS COMPLETE.\nYOU ARE CURRENTLY LOCATED AT SECTOR VECTOR: 40-X.");
            } else if (target === 'BLUEPRINT' && !safeLocked) {
                printText("SCANNED BLUEPRINT. SCHEMATICS DEPICT A HORTEN HO 229 FLYING WING PROTOTYPE.\nTEXT READS: 'PROJEKT ATLAS. FLUGZEUG GESICHERT IN SILO 4.'\n(IGNITION OVERRIDE CIPHER: WINTERGHOST).");
            } else if (environment[target]) {
                if (environment[target].length > 0) {
                    printText(`SCANNED ${target}. IDENTIFIED ASSETS: ${environment[target].join(', ')}.`);
                } else {
                    printText(`${target} IS EMPTY.`);
                }
            } else {
                printText("TARGET NOT FOUND IN IMMEDIATE VICINITY.");
            }
        } else if (action === 'READ') {
             if (!target) {
                printText("SPECIFY ITEM TO READ.");
             } else if (!inventory.includes(target)) {
                printText(`YOU DO NOT POSSESS ${target}.`);
             } else if (target === 'DOSSIER') {
                printText("CLASSIFIED INTEL DOSSIER.\nPAGE 1: MAINFRAME PROTOCOLS.\nADMINISTRATOR PASSWORD IDENTIFIED: VALKYRIE.");
             } else if (target === 'MAP') {
                printText("TOPOGRAPHICAL MAP. YOU ARE CURRENTLY LOCATED AT SECTOR VECTOR: 40-X.");
             } else {
                printText(`THERE IS NOTHING TO READ ON ${target}.`);
             }
        } else if (action === 'FIX') {
             if (!target) {
                 printText("SPECIFY COMPONENT TO FIX.");
             } else if (target === 'RADIO') {
                 if (radioFixed) {
                     printText("RADIO IS ALREADY OPERATIONAL.");
                 } else if (inventory.includes('VACUUM_TUBE')) {
                     radioFixed = true;
                     printText("VACUUM_TUBE INSTALLED. CIRCUIT COMPLETED. RADIO TELEMETRY RESTORED.\nYOU MAY NOW COMMUNICATE WITH COMMAND (COMM_HQ).");
                 } else {
                     printText("CANNOT FIX RADIO. A CRITICAL COMPONENT IS MISSING. CHECK YOUR INVENTORY.");
                 }
             } else {
                 printText("TARGET CANNOT BE FIXED.");
             }
        } else if (action === 'UNLOCK') {
            if (target === 'SAFE') {
                if (!safeLocked) {
                    printText("SAFE IS ALREADY UNLOCKED.");
                } else if (pin === '360') {
                    safeLocked = false;
                    printText("MECHANICAL TUMBLERS DISENGAGED. SAFE UNLOCKED.\nINSIDE YOU SEE: OVERRIDE_KEY, BLUEPRINT. USE 'TAKE OVERRIDE_KEY' TO ACQUIRE.");
                } else {
                    printText("INCORRECT PIN. THE MECHANISM REMAINS LOCKED.");
                }
            } else {
                printText("SPECIFY A VALID TARGET TO UNLOCK. (E.G., UNLOCK SAFE 123)");
            }
        } else if (action === 'TAKE') {
            if (!target) printText("SPECIFY ITEM TO TAKE.");
            else if (target === 'OVERRIDE_KEY' && safeLocked) {
                printText("YOU CANNOT TAKE THAT. THE SAFE IS STILL LOCKED.");
            } else {
                let found = false;
                for (let key in environment) {
                    const index = environment[key].indexOf(target);
                    if (index > -1) {
                        environment[key].splice(index, 1);
                        inventory.push(target);
                        printText(`ACQUIRED: ${target}. ADDED TO INVENTORY.`);
                        found = true;
                        break;
                    }
                }
                if (!found) printText("ITEM NOT FOUND OR ALREADY ACQUIRED.");
            }
        } else if (action === 'INV') {
            if (inventory.length === 0) printText("INVENTORY EMPTY.");
            else printText(`CURRENT INVENTORY: ${inventory.join(', ')}.`);
        } else if (action === 'HACK_ROOT') {
            state = 'HACK_AUTH';
            promptSpan.innerText = "PASSWORD>";
            printText("INITIATING ROOT OVERRIDE...\nACCESS DENIED. ADMINISTRATOR PASSWORD REQUIRED.\n(HINT: READ THE DOSSIER)\nENTER PASSWORD:");
        } else if (action === 'BOOST_SIG') {
            if (signalBoosted >= 3) {
                printText("SIGNAL AT MAXIMUM THRESHOLD. EQUIPMENT OVERHEATING.");
            } else {
                signalBoosted++;
                triangulationRisk += 30;
                
                if (staticGainNode) {
                    let newVolume = 0.005 + (signalBoosted * 0.15);
                    staticGainNode.gain.linearRampToValueAtTime(newVolume, audioCtx.currentTime + 1);
                }
                
                printText(`WARNING: SIGNAL BOOSTED TO LEVEL ${signalBoosted}. CLARITY SECURED.\nCONSEQUENCE: GERMAN RDF STATIONS ARE LOCKING ONTO THIS SECTOR.`);
                
                // Trigger the Kinetic Scramble if they boost too high without jamming
                if (triangulationRisk >= 60 && !jammerUsed) {
                    setTimeout(triggerRDFIntercept, 2000);
                }
            }
        } else if (action === 'JAM_FREQ') {
            if (jammerUsed) {
                printText("FREQUENCY JAMMER ALREADY EXPENDED. HARDWARE BURNT OUT.");
            } else {
                jammerUsed = true;
                triangulationRisk = Math.max(0, triangulationRisk - 40);
                printText("ELECTRONIC WARFARE DEPLOYED. BROADBAND WHITE NOISE TRANSMITTED. ENEMY DIRECTION FINDING CONFOUNDED.\nTRIANGULATION RISK SEVERELY REDUCED.");
            }
        } else if (action === 'COMM_HQ') {
            if (!radioFixed) {
                printText("TRANSMISSION FAILED. HARDWARE FAULT DETECTED IN RADIO UNIT. REPAIR REQUIRED.");
            } else if (signalBoosted === 0) {
                printText("HQ: *Static* ...barely reading you Vanguard... too much interference... boost your signal...");
            } else {
                if (inventory.includes('WAR_PLANS') && !strikeCalled) {
                     printText(`HQ: "Ah, Vanguard. Fascinating. You actually cracked the mainframe. Now for the fun part. Read the local map, find your coordinates, and use CALL_STRIKE to drop artillery on your own position. I know it sounds counter-intuitive, but it's the only way to destroy their local routers and sever the network trace. I'll send a transport once the dust settles."`);
                } else if (inventory.includes('UBOAT_COORD') && !navyContacted) {
                     printText(`HQ: "Naval intel? Brilliant. An artillery strike is too loud for that. Use TX_NAVY to transmit those coordinates directly to the Admiralty. They'll send a submarine for you."`);
                } else if (strikeCalled || navyContacted) {
                     printText(`HQ: "The extraction transport is waiting. Secure the OVERRIDE_KEY from the safe, grab your COMPASS, and request extraction (REQ_EXTRACT). It's simple logic from here."`);
                } else {
                     printText(`HQ: "Vanguard. You're alive. Statistically improbable, but a pleasant anomaly. Listen, you are sitting on the V2 trajectories. Don't call me until you've cracked their mainframe. Read the dossier to get the password, then hack the root. It's a simple logical sequence. Try not to blow yourself up before you get the data."`);
                }
            }
        } else if (action === 'CALL_STRIKE') {
            if (!target) {
                printText("ERROR: TARGET GRID REQUIRED. (E.G., CALL_STRIKE 00-X)");
            } else if (target !== '40-X') {
                printText(`HQ: "Negative. Artillery reports ${target} is empty terrain. Read your map."`);
            } else if (!inventory.includes('WAR_PLANS')) {
                printText(`HQ: "Negative. We cannot bomb that bunker until you have downloaded the V2 WAR_PLANS from the mainframe."`);
            } else {
                strikeCalled = true;
                isTyping = true;
                inputField.disabled = true;
                printText("COORDINATES CONFIRMED. ARTILLERY INBOUND. BRACE FOR IMPACT.", 40, triggerExplosion);
            }
        } else if (action === 'TX_NAVY') {
             if (!inventory.includes('UBOAT_COORD')) {
                printText(`HQ: "We have nothing to transmit to the Navy. Download the UBOAT_COORD from the mainframe first."`);
             } else {
                navyContacted = true;
                printText(`TRANSMITTING ENCRYPTED WOLFPACK COORDINATES ON BROADBAND NAVAL FREQUENCY...\nROYAL NAVY ACKNOWLEDGES RECEIPT. THE ADMIRALTY SENDS THEIR REGARDS.`);
             }
        } else if (action === 'REQ_EXTRACT') {
            if (!inventory.includes('COMPASS') || !inventory.includes('OVERRIDE_KEY')) {
                printText(`HQ: "NEGATIVE ON EXTRACTION. YOU NEED THE OVERRIDE_KEY AND A COMPASS TO NAVIGATE TO THE LZ. SECURE THEM."`);
                return;
            }

            if (inventory.includes('WAR_PLANS')) {
                if (!strikeCalled) {
                    printText(`HQ: "NEGATIVE. YOU SECURED THE V2 PLANS, BUT YOU MUST CALL THE STRIKE TO DESTROY THE FACILITY FIRST."`);
                } else {
                    state = 'CALC_EXTRACT';
                    promptSpan.innerText = "HQ_LINK>";
                    let timeWindow = 45 - (triangulationRisk * 0.35); 
                    printText(`HQ CONNECTED.\n"The bunker is gone. We are holding a C-47 transport plane at Grid 70-X."\n"You are currently at Grid 40-X. The distance is exactly 30 kilometers."\n"You must travel at a sprint pace of 10 kilometers per hour."\n"We can only keep the plane waiting for ${timeWindow.toFixed(1)} hours."\n\nCALCULATE: How many hours will it take you to reach the transport?\nENTER HOURS:`);
                }
            } else if (inventory.includes('UBOAT_COORD')) {
                if (!navyContacted) {
                    printText(`HQ: "NEGATIVE. YOU SECURED THE NAVAL INTEL, BUT YOU MUST TRANSMIT IT TO THE FLEET BEFORE ESCAPING."`);
                } else {
                    state = 'CALC_EXTRACT';
                    promptSpan.innerText = "HQ_LINK>";
                    let timeWindow = 45 - (triangulationRisk * 0.35); 
                    printText(`HQ CONNECTED.\n"The Admiralty has dispatched a submarine to the coast at Grid 90-X."\n"The submarine is exactly 40 nautical miles off the coast."\n"It is approaching at a silent running speed of 20 knots."\n"Gestapo patrols will arrive in ${timeWindow.toFixed(1)} hours."\n\nCALCULATE: How many hours will it take the submarine to arrive?\nENTER HOURS:`);
                }
            } else if (inventory.includes('ATLAS_INTEL')) {
                printText(`HQ: "We see you downloaded the ATLAS file. That is highly experimental. We have no extraction protocols for that. You are on your own."`);
            } else {
                printText(`HQ: "NEGATIVE ON EXTRACTION. YOU HAVEN'T COMPROMISED THE MAINFRAME YET. EXECUTE YOUR MISSION."`);
            }
        } else if (action === 'WINTERGHOST') {
            processExtraction(cmd);
        } else {
            printText("COMMAND UNRECOGNIZED. FOCUS ON THE MISSION.");
        }
    };

    const processExtraction = (cmd) => {
        let answer = parseFloat(cmd);
        
        if (cmd === 'WINTERGHOST') {
            printText("OVERRIDE CIPHER ACCEPTED.\nSILO 4 DOORS OPENING.\nPROJEKT ATLAS FLIGHT SYSTEMS ENGAGED.\n\nYOU STRAP INTO THE PROTOTYPE AIRCRAFT. VERTICAL THRUSTERS IGNITE. YOU PUNCH THROUGH THE ROOF, LEAVING THE LUFTWAFFE IN YOUR WAKE.\n\n*** SECRET MISSION SUCCESS ***", 45, () => {
                inputField.style.display = 'none';
                if(staticGainNode) staticGainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 3); 
            });
            return;
        }

        let correctAnswer = inventory.includes('WAR_PLANS') ? 3 : (inventory.includes('UBOAT_COORD') ? 2 : 0);

        if (answer === correctAnswer) {
            let timeWindow = 45 - (triangulationRisk * 0.35);
            if (correctAnswer <= timeWindow) {
                printText("COORDINATES LOCKED. THE MATH CHECKS OUT.\nGRAB YOUR GEAR. WE WILL SEE YOU IN LONDON.\n\n*** MISSION SUCCESS ***", 40, () => {
                    inputField.style.display = 'none';
                    if(staticGainNode) staticGainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 3); 
                });
            } else {
                printText("THE MATH IS CORRECT, BUT YOU TOOK TOO LONG IN THE BUNKER. THE EXTRACTION ABORTED.\nYOUR DECISIONS BROUGHT THE PATROLS TOO FAST.\n\n*** MISSION FAILED ***", 60, () => {
                    inputField.style.display = 'none';
                });
            }
        } else {
            triangulationRisk += 5; 
            printText("INCORRECT CALCULATION. TIME IS RUNNING OUT. TRY AGAIN:");
        }
    };

    printText("SYSTEM AKTIVIERT. TERMINAL POWERED ON.\nBITTE CHOOSE YOUR PROTOCOL:\n[1] NORMAL OP (STANDARD VERSCHLÜSSELUNG)\n[2] TRAINING OP (ASSISTED ENTSCHLÜSSELUNG)\nENTER EINGABE:");

    inputField.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
            handleInput(inputField.value);
        }
    });
</script>

</body>
</html>
